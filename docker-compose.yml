services:
  ppbau:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ppbau
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ppbau.rule=Host(`ppbau.com`) || Host(`www.ppbau.com`)"
      - "traefik.http.routers.ppbau.entrypoints=websecure"
      - "traefik.http.routers.ppbau.tls.certresolver=letsencrypt"
      - "traefik.http.services.ppbau.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dokploy-network:
    external: true
